{% extends 'account_base.html' %}
{% load static %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h1>VERIFY CODE</h1>
        <div class="subtitle">Enter the 6-digit code sent to your email</div>
        
        {% if messages %}
            {% for message in messages %}
                <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="code">Verification Code</label>
                <input type="text" id="code" name="code" maxlength="6" pattern="[0-9]{6}" placeholder="000000" required autofocus>
                <small class="field-note">Code expires in 10 minutes</small>
            </div>
            
            <button type="submit" class="btn-primary">VERIFY CODE</button>
        </form>
        
        <div class="auth-link">
            <a href="{% url 'forgot_password' %}">Request New Code</a>
        </div>
    </div>
</div>

<style>
:root {
    --admin-purple: #8b5cf6;
    --admin-purple-dark: #7c3aed;
    --admin-purple-light: #a78bfa;
    --admin-purple-glow: rgba(139, 92, 246, 0.2);
    --admin-bg: #ffffff;
    --admin-text: #1f2937;
    --admin-text-secondary: #4b5563;
    --admin-text-muted: #6b7280;
    --admin-border: #e5e7eb;
    --admin-card: #f9fafb;
    --admin-danger: #ef4444;
}

.auth-container {
    min-height: calc(100vh - 200px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
}

.auth-box {
    background: var(--admin-card);
    border: 1px solid var(--admin-border);
    border-radius: 12px;
    padding: 2.5rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
}

.auth-box h1 {
    font-size: 2rem;
    font-weight: 700;
    color: var(--admin-text);
    margin-bottom: 0.5rem;
}

.auth-box .subtitle {
    color: var(--admin-text-secondary);
    font-size: 0.9rem;
    margin-bottom: 2rem;
}

.message {
    background: rgba(139, 92, 246, 0.1);
    border: 1px solid var(--admin-purple);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    margin-bottom: 1.5rem;
    color: var(--admin-purple-dark);
    font-size: 0.9rem;
    text-align: center;
}

.message.error {
    background: rgba(239, 68, 68, 0.1);
    border-color: var(--admin-danger);
    color: var(--admin-danger);
}

.form-group {
    margin-bottom: 1.5rem;
}

.form-group label {
    display: block;
    color: var(--admin-text-secondary);
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
    font-weight: 500;
}

.form-group input {
    width: 100%;
    background: #ffffff;
    border: 1px solid var(--admin-border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    color: var(--admin-text);
    font-size: 1rem;
    font-family: 'Inter', sans-serif;
    transition: all 0.3s ease;
    text-align: center;
    letter-spacing: 2px;
}

.form-group input:focus {
    outline: none;
    border-color: var(--admin-purple);
    box-shadow: 0 0 0 3px var(--admin-purple-glow);
}

.field-note {
    display: block;
    color: var(--admin-text-muted);
    font-size: 0.8rem;
    margin-top: 0.25rem;
    text-align: center;
}

.btn-primary {
    width: 100%;
    background: var(--admin-purple);
    border: none;
    border-radius: 8px;
    padding: 1rem;
    color: #ffffff;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-primary:hover {
    background: var(--admin-purple-dark);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px var(--admin-purple-glow);
}

.auth-link {
    text-align: center;
    margin-top: 1.5rem;
}

.auth-link a {
    color: var(--admin-text-secondary);
    text-decoration: none;
    font-size: 0.9rem;
    transition: color 0.3s ease;
}

.auth-link a:hover {
    color: var(--admin-purple);
}
</style>
{% endblock %}
