{% extends 'account_base.html' %}
{% load static %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <div class="auth-header">
            <h1>FORGOT PASSWORD</h1>
            <p class="subtitle">Enter your email to receive a verification code</p>
        </div>
        
        <div id="messages-container" class="messages-container">
            {% if messages %}
                {% for message in messages %}
                    <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        </div>
        
        <form method="POST" class="auth-form" id="forgotForm">
            {% csrf_token %}
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" 
                       id="email" 
                       name="email" 
                       placeholder="your@email.com" 
                       required 
                       autofocus
                       class="email-input">
                <div class="error-message" id="emailError"></div>
                <div class="validation-message" id="emailValidation"></div>
            </div>
            
            <button type="submit" class="btn-primary" id="submitBtn" disabled>
                <span class="btn-icon">✉</span>
                SEND CODE
            </button>
        </form>
        
        <div class="auth-footer">
            <a href="{% url 'login' %}" class="auth-link">
                <span class="link-icon">←</span>
                Back to Login
            </a>
        </div>
    </div>
</div>

<style>
:root {
    --admin-purple: #8b5cf6;
    --admin-purple-dark: #7c3aed;
    --admin-purple-light: #a78bfa;
    --admin-purple-glow: rgba(139, 92, 246, 0.2);
    --admin-bg: #ffffff;
    --admin-text: #1f2937;
    --admin-text-secondary: #4b5563;
    --admin-text-muted: #6b7280;
    --admin-border: #e5e7eb;
    --admin-card: #f9fafb;
    --admin-danger: #ef4444;
    --admin-success: #10b981;
}

.auth-container {
    min-height: calc(100vh - 200px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: linear-gradient(135deg, var(--admin-card) 0%, #ffffff 100%);
}

.auth-box {
    background: #ffffff;
    border: 1px solid var(--admin-border);
    border-radius: 24px;
    padding: 2.5rem;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(139, 92, 246, 0.1);
}

.auth-header {
    text-align: center;
    margin-bottom: 2rem;
}

.auth-header h1 {
    font-size: 2rem;
    font-weight: 700;
    color: var(--admin-text);
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--admin-text) 0%, var(--admin-purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.auth-header .subtitle {
    color: var(--admin-text-secondary);
    font-size: 0.95rem;
}

.messages-container {
    margin-bottom: 1.5rem;
}

.message {
    background: rgba(139, 92, 246, 0.1);
    border: 1px solid var(--admin-purple);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
    color: var(--admin-purple-dark);
    font-size: 0.95rem;
    text-align: center;
    animation: slideDown 0.3s ease;
}

.message.error {
    background: rgba(239, 68, 68, 0.1);
    border-color: var(--admin-danger);
    color: var(--admin-danger);
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.auth-form {
    margin-bottom: 1.5rem;
}

.form-group {
    margin-bottom: 2rem;
}

.form-group label {
    display: block;
    color: var(--admin-text-secondary);
    font-size: 0.9rem;
    margin-bottom: 0.75rem;
    font-weight: 500;
}

.email-input {
    width: 100%;
    background: #ffffff;
    border: 2px solid var(--admin-border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    color: var(--admin-text);
    font-size: 1rem;
    font-family: 'Inter', sans-serif;
    transition: all 0.3s ease;
}

.email-input:focus {
    outline: none;
    border-color: var(--admin-purple);
    box-shadow: 0 0 0 4px var(--admin-purple-glow);
}

.email-input.valid {
    border-color: var(--admin-success);
    background: rgba(16, 185, 129, 0.02);
}

.email-input.invalid {
    border-color: var(--admin-danger);
    background: rgba(239, 68, 68, 0.02);
}

.error-message {
    color: var(--admin-danger);
    font-size: 0.85rem;
    margin-top: 0.5rem;
    min-height: 1.2rem;
}

.validation-message {
    color: var(--admin-success);
    font-size: 0.85rem;
    margin-top: 0.5rem;
    min-height: 1.2rem;
}

.btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--admin-purple) 0%, var(--admin-purple-dark) 100%);
    border: none;
    border-radius: 12px;
    padding: 1rem 1.5rem;
    color: #ffffff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    opacity: 1;
}

.btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

.btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px -5px var(--admin-purple);
}

.btn-icon {
    font-size: 1.2rem;
}

.auth-footer {
    text-align: center;
    padding-top: 1rem;
    border-top: 1px solid var(--admin-border);
}

.auth-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--admin-purple);
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 500;
    padding: 0.5rem 1rem;
    border-radius: 30px;
    transition: all 0.3s ease;
    background: rgba(139, 92, 246, 0.1);
}

.auth-link:hover {
    background: rgba(139, 92, 246, 0.2);
}

.link-icon {
    font-size: 1rem;
}

@media (max-width: 480px) {
    .auth-box {
        padding: 2rem 1.5rem;
    }
    
    .auth-header h1 {
        font-size: 1.75rem;
    }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submitBtn');
    const emailError = document.getElementById('emailError');
    const emailValidation = document.getElementById('emailValidation');
    
    let emailTouched = false;
    let checkTimeout;
    
    function validateEmailFormat(email) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(email);
    }
    
    function checkEmailExists(email) {
        fetch('/account/check-email/', {
            method: 'POST',
            headers: {
                'X-CSRFToken': '{{ csrf_token }}',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email: email })
        })
        .then(response => response.json())
        .then(data => {
            if (data.exists && data.is_admin) {
                emailInput.classList.add('valid');
                emailInput.classList.remove('invalid');
                emailValidation.textContent = '✓ Email verified';
                emailError.textContent = '';
                submitBtn.disabled = false;
            } else {
                emailInput.classList.add('invalid');
                emailInput.classList.remove('valid');
                emailValidation.textContent = '';
                if (!data.exists) {
                    emailError.textContent = 'Email not found';
                } else if (!data.is_admin) {
                    emailError.textContent = 'Not an admin account';
                }
                submitBtn.disabled = true;
            }
        })
        .catch(error => {
            console.error('Error:', error);
        });
    }
    
    emailInput.addEventListener('input', function() {
        const email = this.value.trim();
        
        clearTimeout(checkTimeout);
        
        if (!emailTouched && email.length > 0) {
            emailTouched = true;
        }
        
        if (!validateEmailFormat(email)) {
            emailInput.classList.remove('valid', 'invalid');
            emailError.textContent = email.length > 0 ? 'Invalid email format' : '';
            emailValidation.textContent = '';
            submitBtn.disabled = true;
            return;
        }
        
        emailError.textContent = '';
        emailValidation.textContent = 'Checking...';
        
        checkTimeout = setTimeout(() => {
            checkEmailExists(email);
        }, 500);
    });
    
    emailInput.addEventListener('blur', function() {
        if (this.value.trim().length > 0 && !emailTouched) {
            emailTouched = true;
            this.dispatchEvent(new Event('input'));
        }
    });
    
    setTimeout(function() {
        const messages = document.querySelectorAll('.message');
        messages.forEach(function(message) {
            message.style.transition = 'opacity 0.5s ease';
            message.style.opacity = '0';
            setTimeout(function() {
                message.remove();
            }, 500);
        });
    }, 5000);
});
</script>
{% endblock %}
